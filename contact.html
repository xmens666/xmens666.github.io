<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - ZenCode.jp</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/i18n.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'Yuanti SC', 'YouYuan', 'Noto Sans SC', 'sans-serif'], heading: ['Nunito', 'Yuanti SC', 'YouYuan', 'Noto Sans SC', 'sans-serif'] },
                    colors: { 'brand-green': '#0a1f1a', 'accent-green': '#00FFA3' }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }

        /* 玻璃拟态效果 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            appearance: none;
        }

        .input-field:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: #00FFA3;
            box-shadow: 0 0 15px rgba(0, 255, 163, 0.1);
            outline: none;
        }

        select option {
            background-color: #0a1f1a;
            color: #fff;
            padding: 10px;
        }

        /* 加载动画 */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00FFA3;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-brand-green text-slate-200 min-h-screen flex flex-col relative overflow-x-hidden" x-data="{ lang: (localStorage.getItem('zencode_lang') || 'zh'), setLang(l) { this.lang = l; localStorage.setItem('zencode_lang', l); if (typeof applyTranslations === 'function') applyTranslations(l); }, t(key) { if (typeof I18N !== 'undefined') { const e = I18N[key]; return e ? (e[this.lang] || e.zh || key) : key; } return key; } }">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] bg-accent-green/10 rounded-full blur-[120px]">
        </div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] bg-purple-600/10 rounded-full blur-[120px]">
        </div>
    </div>

    <nav class="w-full px-6 py-6 flex justify-between items-center relative z-20">
        <a href="index.html" class="flex items-center gap-2 group">
            <span class="text-accent-green font-bold text-2xl">&lt;</span>
            <span class="text-white font-bold text-xl group-hover:text-accent-green transition">ZenCode</span>
        </a>
        <button class="px-3 py-1.5 rounded-lg border border-white/15 text-white/60 text-sm hover:text-white hover:border-white/30 transition flex items-center gap-1.5" @click="setLang(lang === 'zh' ? 'en' : lang === 'en' ? 'ja' : 'zh')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span x-text="lang === 'zh' ? '中文' : lang === 'en' ? 'EN' : '日本語'"></span>
        </button>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 py-10 relative z-10">
        <div
            class="glass-panel rounded-3xl max-w-6xl w-full grid grid-cols-1 lg:grid-cols-5 overflow-hidden min-h-[600px]">

            <div class="lg:col-span-2 p-10 flex flex-col justify-between relative overflow-hidden bg-white/[0.02]">
                <div class="absolute top-0 right-0 w-32 h-32 bg-accent-green/5 rounded-full blur-2xl -mr-16 -mt-16">
                </div>

                <div>
                    <h1 class="text-3xl font-bold text-white mb-6 font-heading">
                        <span class="inline md:block" x-cloak>
                            <template x-if="lang==='zh'"><span>让我们开始</span></template>
                            <template x-if="lang==='en'"><span>Let's Start a</span></template>
                            <template x-if="lang==='ja'"><span>はじめましょう</span></template>
                        </span>
                        <span class="inline md:block text-accent-green ml-1 md:ml-0" x-cloak>
                            <template x-if="lang==='zh'"><span>对话</span></template>
                            <template x-if="lang==='en'"><span>Conversation</span></template>
                            <template x-if="lang==='ja'"><span>対話を</span></template>
                        </span>
                    </h1>
                    <p class="text-slate-400 mb-10 leading-relaxed" x-cloak>
                        <template x-if="lang==='zh'"><span>填写表格，我们的技术顾问将在当日通过邮件或微信与您联系。</span></template>
                        <template x-if="lang==='en'"><span>Fill out the form and our tech consultant will contact you via email or WeChat the same day.</span></template>
                        <template x-if="lang==='ja'"><span>フォームにご記入いただければ、技術コンサルタントが当日中にメールまたはWeChatでご連絡いたします。</span></template>
                    </p>

                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <div
                                class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center text-accent-green border border-white/5">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.32.32 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178A1.17 1.17 0 014.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178 1.17 1.17 0 01-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 01.598.082l1.584.926a.272.272 0 00.14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.49.49 0 01.176-.554C23.137 18.638 24 17.078 24 15.354c0-3.407-3.268-6.18-7.062-6.496zm-2.395 2.725c.535 0 .969.44.969.982a.976.976 0 01-.969.983.976.976 0 01-.969-.983c0-.542.434-.982.97-.982zm4.842 0c.535 0 .969.44.969.982a.976.976 0 01-.969.983.976.976 0 01-.969-.983c0-.542.434-.982.969-.982z"/>
                                </svg>
                            </div>
                            <span class="text-sm text-slate-300">xiaobo-japan</span>
                        </div>
                    </div>
                </div>

                <div class="mt-12 pt-8 border-t border-white/5">
                    <p class="text-xs text-slate-500">
                        &copy; 2026 ZenCode.jp
                    </p>
                </div>
            </div>

            <div class="lg:col-span-3 p-10 bg-black/20 flex flex-col justify-center relative">

                <form id="my-form" action="https://formspree.io/f/mdakppzg" method="POST"
                    class="space-y-5 transition-opacity duration-500">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider" x-text="lang==='zh' ? '您的称呼' : lang==='en' ? 'Your Name' : 'お名前'"></label>
                            <input type="text" name="name" required
                                :placeholder="lang==='zh' ? '张先生' : lang==='en' ? 'Mr. Zhang' : '田中様'"
                                class="input-field w-full rounded-xl px-4 py-3 text-white placeholder-slate-600">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider" x-text="lang==='zh' ? '联系方式' : lang==='en' ? 'Contact' : '連絡先'"></label>
                            <input type="text" name="contact" required
                                :placeholder="lang==='zh' ? '邮箱 或 微信号' : lang==='en' ? 'Email or WeChat' : 'メールまたはWeChat'"
                                class="input-field w-full rounded-xl px-4 py-3 text-white placeholder-slate-600">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider" x-text="lang==='zh' ? '感兴趣的服务' : lang==='en' ? 'Service Interest' : 'ご興味のあるサービス'"></label>
                        <div class="relative">
                            <select name="service"
                                class="input-field w-full rounded-xl px-4 py-3 text-white cursor-pointer pr-10">
                                <option value="系统开发" x-text="lang==='zh' ? '📱 行业系统 / App 开发' : lang==='en' ? '📱 Industry System / App Dev' : '📱 業界システム / アプリ開発'"></option>
                                <option value="网站建设" x-text="lang==='zh' ? '🌐 企业官网 / 落地页' : lang==='en' ? '🌐 Corporate Website / Landing Page' : '🌐 企業サイト / ランディングページ'"></option>
                                <option value="平台定制" x-text="lang==='zh' ? '🚀 大型平台 (类似 Uber/淘宝)' : lang==='en' ? '🚀 Large Platform (Uber/Taobao-like)' : '🚀 大規模プラットフォーム (Uber/淘宝型)'"></option>
                                <option value="AI客服" x-text="lang==='zh' ? '🤖 AI 智能客服 / 效率工具' : lang==='en' ? '🤖 AI Customer Service / Productivity Tools' : '🤖 AI カスタマーサービス / 効率化ツール'"></option>
                                <option value="其他咨询" x-text="lang==='zh' ? '💡 其他技术咨询' : lang==='en' ? '💡 Other Technical Consulting' : '💡 その他技術コンサルティング'"></option>
                            </select>
                            <div
                                class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-accent-green">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider" x-text="lang==='zh' ? '项目描述' : lang==='en' ? 'Project Description' : 'プロジェクト概要'"></label>
                        <textarea name="message" rows="4" required
                            :placeholder="lang==='zh' ? '简单描述您的需求...' : lang==='en' ? 'Briefly describe your needs...' : 'ご要望を簡単にご記入ください...'"
                            class="input-field w-full rounded-xl px-4 py-3 text-white placeholder-slate-600"></textarea>
                    </div>

                    <button type="submit" id="submit-btn"
                        class="w-full py-4 bg-accent-green hover:bg-accent-green/90 text-black font-bold text-lg rounded-xl transition duration-300 shadow-[0_0_20px_rgba(0,255,163,0.3)] hover:shadow-[0_0_30px_rgba(0,255,163,0.5)] transform hover:-translate-y-1 active:translate-y-0 flex items-center justify-center gap-2">
                        <span class="flex items-center gap-2">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
                            <span x-text="lang==='zh' ? '发送邮件 (直达创始人)' : lang==='en' ? 'Send Email (Direct to Founder)' : 'メール送信（創業者直通）'"></span>
                        </span>
                    </button>

                    <p id="error-msg" class="text-red-500 text-sm text-center hidden"></p>
                </form>

                <div id="success-view"
                    class="hidden absolute inset-0 flex flex-col items-center justify-center text-center p-10 space-y-6">
                    <div
                        class="w-24 h-24 bg-accent-green/10 rounded-full flex items-center justify-center mb-4 ring-1 ring-accent-green/50">
                        <svg class="w-12 h-12 text-accent-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-3xl font-bold text-white mb-2" x-text="lang==='zh' ? '发送成功！' : lang==='en' ? 'Sent Successfully!' : '送信完了！'"></h2>
                        <p class="text-slate-400" x-cloak>
                            <template x-if="lang==='zh'"><span>感谢您的咨询。<br>我们的技术顾问已收到您的需求，将尽快与您联系。</span></template>
                            <template x-if="lang==='en'"><span>Thank you for your inquiry.<br>Our tech consultant has received your request and will contact you shortly.</span></template>
                            <template x-if="lang==='ja'"><span>お問い合わせありがとうございます。<br>技術コンサルタントがご要望を受け取りました。早急にご連絡いたします。</span></template>
                        </p>
                    </div>
                    <a href="index.html"
                        class="px-8 py-3 rounded-full border border-white/20 hover:bg-white hover:text-black transition text-sm font-bold"
                        x-text="lang==='zh' ? '返回首页' : lang==='en' ? 'Back to Home' : 'ホームに戻る'">
                    </a>
                </div>

            </div>
        </div>
    </main>

    <script>
        function getErrorMsg(type) {
            var lang = localStorage.getItem('zencode_lang') || 'zh';
            if (type === 'network') {
                if (lang === 'en') return 'Failed to send. Please check your network and try again.';
                if (lang === 'ja') return '送信に失敗しました。ネットワークを確認して再度お試しください。';
                return '发送失败，请检查网络后重试';
            }
            if (lang === 'en') return 'Failed to send. Please try again later.';
            if (lang === 'ja') return '送信に失敗しました。後ほどお試しください。';
            return '发送失败，请稍后重试。';
        }

        function getSendingText() {
            var lang = localStorage.getItem('zencode_lang') || 'zh';
            if (lang === 'en') return 'Sending...';
            if (lang === 'ja') return '送信中...';
            return '发送中...';
        }

        var form = document.getElementById("my-form");
        var successView = document.getElementById("success-view");
        var submitBtn = document.getElementById("submit-btn");
        var errorMsg = document.getElementById("error-msg");

        async function handleSubmit(event) {
            event.preventDefault();
            var data = new FormData(event.target);

            // Button loading state
            var originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<div class="spinner"></div> ' + getSendingText();
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    form.classList.add('opacity-0');
                    setTimeout(() => {
                        form.classList.add('hidden');
                        successView.classList.remove('hidden');
                        successView.animate([
                            { opacity: 0, transform: 'scale(0.95)' },
                            { opacity: 1, transform: 'scale(1)' }
                        ], { duration: 500, fill: 'forwards' });
                    }, 500);
                } else {
                    response.json().then(data => {
                        if (Object.hasOwn(data, 'errors')) {
                            errorMsg.textContent = data["errors"].map(error => error["message"]).join(", ");
                        } else {
                            errorMsg.textContent = getErrorMsg('network');
                        }
                        errorMsg.classList.remove('hidden');
                        resetBtn();
                    })
                }
            }).catch(error => {
                errorMsg.textContent = getErrorMsg('network');
                errorMsg.classList.remove('hidden');
                resetBtn();
            });

            function resetBtn() {
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
        form.addEventListener("submit", handleSubmit);
    </script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
    <script>
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: false,
            touchMultiplier: 2,
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
    </script>

</body>

</html>
